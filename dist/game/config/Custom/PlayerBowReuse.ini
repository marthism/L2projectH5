# ---------------------------------------------------------------------------
# Player Bow/Crossbow Reuse Reduction
# ---------------------------------------------------------------------------

# Enable/Disable removing the extra reuse (reload) delay bows and crossbows
# have on top of normal P.Atk Speed, so players fire continuously.
EnablePlayerBowReuseReduction = True

# Multiplier applied to the bow/crossbow reuse delay. 0.0 = no delay at all
# (continuous fire). 1.0 = normal reuse delay (no change).
PlayerBowReuseMultiplier = 0.0
