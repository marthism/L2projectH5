# ---------------------------------------------------------------------------
# Monster Defense Reduction
# ---------------------------------------------------------------------------

# Enable/Disable reducing P.Def/M.Def of regular (non-raid) monsters, except
# those located inside the excluded zone (Primeval Isle by default).
EnableMonsterDefenseReduction = True

# Multiplier applied to monster P.Def. 0.7 = 30% reduction.
MonsterPDefReductionMultiplier = 0.7

# Multiplier applied to monster M.Def. 0.7 = 30% reduction.
MonsterMDefReductionMultiplier = 0.7

# Zone id excluded from the reduction. Default 40001 is Primeval Isle (Town Zone).
ExcludedZoneId = 40001
